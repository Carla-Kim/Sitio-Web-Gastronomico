{% extends 'dashboard.html' %}

{% block title %}
Inicio | Dashboard
{% endblock %}

{% block extra_css %}
{% endblock %}

{% block content %}
<section class="page">

    <div class="page-header">
        <h1 class="page-title">
            Dashboard
        </h1>
    </div>

    <div class="card">
        <div class="dashboard-grid">

            <div class="dashboard-widget medium-widget">
                <canvas id="reservas-chart"></canvas>
            </div>

            <div class="dashboard-widget medium-widget">
                <canvas id="menu-chart"></canvas>
            </div>

            <div class="dashboard-widget large-widget">
                <canvas id="usuarios-chart"></canvas>
            </div>

            <div class="dashboard-widget large-widget">
                <canvas id="reseñas-chart"></canvas>
            </div>

        </div>
    </div>

</section>
{% endblock %}

{% block extra_js %}
<script id="dashboard-data" type="application/json">
{{ stats | tojson }}
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/dashboard/home.js') }}"></script>
{% endblock %}
