{% extends "dashboard.html" %}

{% block title %}
Login | Dashboard
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard-login.css') }}">
{% endblock %}

{% block admin_nav %}
{% endblock %}

{% block content %}
<section class="login-section">

    <div class="login-brand">

        <h1 class="login-title">
            BASHEROS
        </h1>
        <p class="login-subtitle">
            Gestor de datos
        </p>

    </div>

    <div class="login-card">

        <div class="login-header">
            <h2 class="welcome-title">
                ¡Bienvenido!
            </h2>
        </div>

    {% if error %}
    <div class="modal-overlay">
        <div class="modal-card modal-error">

            <h2 class="modal-title">
                Error
            </h2>

            <p class="modal-message">
                {{ error }}
            </p>

            <button class="close-modal-button" onclick="this.closest('.modal-overlay').classList.add('hidden')">
                x
            </button>

        </div>
    </div>
    {% endif %}

        <form class="login-form" method="POST">

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="contraseña">
            </div>

            <button class="login-button" type="submit">
                Acceder
            </button>

        </form>

    </div>
</section>
{% endblock %}
