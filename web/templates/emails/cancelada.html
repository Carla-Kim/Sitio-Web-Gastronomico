<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancelación de reserva</title>
</head>
<body style="margin:0; padding:0; font-family:Arial, Helvetica, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center" style="padding:48px 20px;">
        <table width="600" cellpadding="0" cellspacing="0" border="0"
               style="background-color:#141414; border:1px solid rgba(201,168,76,0.18); max-width:600px; width:100%;">

          <tr>
            <td style="padding:38px 30px 28px; text-align:center; border-bottom:1px solid rgba(201,168,76,0.12);">
              <p style="margin:0; font-family:Georgia, 'Times New Roman', serif; font-size:22px;
                        font-weight:400; color:#C9A84C; letter-spacing:6px; text-transform:uppercase;">
                Basheros - Sitio Gastronómico
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding:36px 30px 10px; text-align:center;">
              <h1 style="margin:0; font-family:Georgia, 'Times New Roman', serif; font-weight:400;
                         font-size:26px; color:#EDEAE3; letter-spacing:1px;">
                Reserva cancelada
              </h1>
            </td>
          </tr>

          <tr>
            <td style="padding:18px 40px 40px; text-align:center;">
              <p style="font-family:Arial, sans-serif; font-size:14px; line-height:1.9; color:#A09080;
                        letter-spacing:0.3px; margin:0 0 14px;">
                Hola {{ usuario.get('nombre', '') }}, te informamos que tu reserva para el día
                <span style="color:#C9A84C;">{{ reserva.fecha }}</span> fue cancelada con éxito.
              </p>
              <p style="font-family:Arial, sans-serif; font-size:13px; line-height:1.9; color:#80766a;
                        letter-spacing:0.2px; margin:0;">
                Si no solicitaste este cambio o querés reprogramar, ponete en contacto con nosotros.
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding:24px 30px; text-align:center; border-top:1px solid rgba(201,168,76,0.12);">
              <p style="margin:0; font-family:Arial, sans-serif; font-size:10px; letter-spacing:0.15em;
                        color:rgba(160,144,128,0.6); text-transform:uppercase;">
                Basheros - Sitio Gastronómico
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
